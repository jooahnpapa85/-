<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>점심 메뉴 룰렛 🍽️</title>

  <!-- Leaflet 지도 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background-color: #1a0a00;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(255,90,0,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(200,40,0,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, rgba(255,180,0,0.10) 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 20px 50px;
      position: relative;
      overflow-x: hidden;
    }

    .bg-food {
      position: fixed;
      font-size: 2rem;
      opacity: 0.07;
      pointer-events: none;
      animation: float linear infinite;
      z-index: 0;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.07; }
      90%  { opacity: 0.07; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
    body > *:not(.bg-food) { position: relative; z-index: 1; }

    h1 {
      color: #fff8f0;
      font-size: 2rem;
      margin-bottom: 6px;
      text-shadow: 0 2px 16px rgba(255,100,0,0.5);
    }
    .subtitle {
      color: rgba(255,210,160,0.85);
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    /* 카드 공통 */
    .card {
      background: white;
      border-radius: 24px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      margin-bottom: 20px;
    }

    /* 결과 박스 */
    .roulette-area { text-align: center; margin-bottom: 24px; }
    .result-boxes { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }

    .result-box {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      border-radius: 18px;
      padding: 22px 20px;
      flex: 1;
      box-shadow: 0 6px 20px rgba(240,147,251,0.35);
      transition: transform 0.2s;
    }
    .result-box .person-label {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.85);
      margin-bottom: 6px;
      font-weight: 600;
    }
    .result-box .menu-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.1);
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .result-box .menu-emoji { font-size: 2.2rem; margin-bottom: 6px; }

    .result-box.spinning .menu-name { animation: spin-text 0.1s infinite; }
    @keyframes spin-text {
      0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; }
    }
    .result-box.landed { animation: bounce 0.5s ease; }
    @keyframes bounce {
      0% { transform: scale(1); }
      40% { transform: scale(1.12); }
      70% { transform: scale(0.95); }
      100% { transform: scale(1); }
    }

    /* 버튼 */
    .spin-btn {
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, #ff6a00 0%, #ee0979 100%);
      color: white;
      border: none;
      border-radius: 16px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      box-shadow: 0 6px 24px rgba(255,80,0,0.45);
    }
    .spin-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(255,80,0,0.6); }
    .spin-btn:active { transform: translateY(0); }
    .spin-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* 지도 카드 */
    .map-card {
      background: white;
      border-radius: 24px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      margin-bottom: 20px;
      overflow: hidden;
      display: none;
    }
    .map-card.visible { display: block; }

    .map-header {
      padding: 18px 22px 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .map-header h2 { font-size: 1rem; color: #333; margin-bottom: 4px; }
    .map-header p  { font-size: 0.82rem; color: #999; }

    #map { width: 100%; height: 320px; }

    /* 식당 목록 */
    .restaurant-list {
      max-height: 260px;
      overflow-y: auto;
      border-top: 1px solid #f0f0f0;
    }
    .restaurant-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 20px;
      border-bottom: 1px solid #fafafa;
      cursor: pointer;
      transition: background 0.15s;
    }
    .restaurant-item:hover { background: #fff8f3; }
    .restaurant-item:last-child { border-bottom: none; }

    .r-emoji { font-size: 1.6rem; min-width: 36px; text-align: center; }
    .r-info { flex: 1; }
    .r-name { font-size: 0.95rem; font-weight: 700; color: #222; }
    .r-cat  { font-size: 0.78rem; color: #ff6a00; font-weight: 600; margin-top: 2px; }
    .r-addr { font-size: 0.75rem; color: #aaa; margin-top: 2px; }
    .r-dist { font-size: 0.8rem; color: #888; min-width: 42px; text-align: right; }

    /* 메뉴 관리 카드 */
    .menu-card {
      background: white;
      border-radius: 24px;
      padding: 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    }
    .menu-card h2 { font-size: 1rem; color: #444; margin-bottom: 16px; }

    .category-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .cat-tab {
      padding: 6px 14px;
      border-radius: 20px;
      border: none;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: inherit;
      font-weight: 600;
      transition: all 0.2s;
      background: #f0f0f0;
      color: #666;
    }
    .cat-tab.active { background: #ff6a00; color: white; }

    .menu-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; min-height: 50px; }

    .menu-tag {
      display: flex;
      align-items: center;
      gap: 5px;
      background: #fff3ec;
      border: 1.5px solid #ffd0b0;
      border-radius: 20px;
      padding: 6px 12px;
      font-size: 0.88rem;
      color: #c04000;
      font-weight: 600;
      transition: all 0.2s;
    }
    .menu-tag.excluded { background: #f5f5f5; border-color: #ddd; color: #999; text-decoration: line-through; }
    .menu-tag .tag-toggle { cursor: pointer; font-size: 0.75rem; opacity: 0.6; transition: opacity 0.15s; }
    .menu-tag .tag-toggle:hover { opacity: 1; }

    .add-menu-row { display: flex; gap: 8px; }
    .add-menu-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .add-menu-input:focus { border-color: #ff6a00; }
    .add-btn {
      padding: 10px 18px;
      background: #ff6a00;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .add-btn:hover { background: #d95500; }

    .menu-count { font-size: 0.78rem; color: #aaa; margin-top: 8px; }

    .footer { color: rgba(255,180,100,0.5); font-size: 0.78rem; margin-top: 16px; }

    /* 위치 설정 카드 */
    .location-card {
      background: white;
      border-radius: 24px;
      padding: 22px 28px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.25);
      margin-bottom: 20px;
    }
    .location-card h2 { font-size: 1rem; color: #444; margin-bottom: 14px; }

    .location-status {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: #f9f9f9;
      margin-bottom: 14px;
      font-size: 0.88rem;
    }
    .location-status.set   { background: #fff3ec; }
    .location-status .dot  { width: 10px; height: 10px; border-radius: 50%; background: #ccc; flex-shrink: 0; }
    .location-status.set .dot { background: #ff6a00; }
    .location-status .loc-text { flex: 1; color: #555; }
    .location-status.set .loc-text { color: #c04000; font-weight: 600; }

    .location-btns { display: flex; gap: 8px; margin-bottom: 12px; }
    .loc-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      background: white;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      color: #555;
      transition: all 0.2s;
    }
    .loc-btn.primary { background: #ff6a00; color: white; border-color: #ff6a00; }
    .loc-btn.primary:hover { background: #d95500; }
    .loc-btn:hover:not(.primary) { border-color: #ff6a00; color: #ff6a00; }

    .location-manual {
      display: none;
      gap: 8px;
      flex-direction: column;
    }
    .location-manual.open { display: flex; }
    .location-manual input {
      padding: 9px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .location-manual input:focus { border-color: #ff6a00; }
    .location-manual .manual-row { display: flex; gap: 8px; }
    .location-manual .manual-row input { flex: 1; }
    .location-manual .save-loc-btn {
      padding: 9px;
      background: #ff6a00;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    .location-manual .save-loc-btn:hover { background: #d95500; }

    /* 식당 추가 섹션 */
    .section-divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin: 20px 0;
    }
    .restaurant-add-title {
      font-size: 1rem;
      color: #444;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .restaurant-add-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px;
    }
    .restaurant-add-grid input, .restaurant-add-grid select {
      padding: 9px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 10px;
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .restaurant-add-grid input:focus,
    .restaurant-add-grid select:focus { border-color: #ff6a00; }
    .restaurant-add-grid input.full { grid-column: 1 / -1; }
    .add-restaurant-btn {
      width: 100%;
      padding: 10px;
      background: #fff3ec;
      color: #ff6a00;
      border: 1.5px solid #ffd0b0;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }
    .add-restaurant-btn:hover { background: #ff6a00; color: white; }

    .restaurant-tag-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 12px; }
    .restaurant-tag {
      display: flex;
      align-items: center;
      gap: 4px;
      background: #f5f5f5;
      border-radius: 16px;
      padding: 5px 10px;
      font-size: 0.8rem;
      color: #555;
    }
    .restaurant-tag .del-btn {
      cursor: pointer;
      color: #ccc;
      font-size: 0.7rem;
      transition: color 0.15s;
    }
    .restaurant-tag .del-btn:hover { color: #e00; }
  </style>
</head>
<body>

  <!-- 배경 이모지 -->
  <div class="bg-food" style="left:5%;animation-duration:14s;animation-delay:0s;font-size:2.5rem">🍜</div>
  <div class="bg-food" style="left:18%;animation-duration:18s;animation-delay:3s">🍣</div>
  <div class="bg-food" style="left:32%;animation-duration:12s;animation-delay:1s;font-size:1.6rem">🍕</div>
  <div class="bg-food" style="left:50%;animation-duration:16s;animation-delay:5s;font-size:3rem">🥩</div>
  <div class="bg-food" style="left:65%;animation-duration:20s;animation-delay:2s">🍱</div>
  <div class="bg-food" style="left:78%;animation-duration:13s;animation-delay:7s;font-size:1.8rem">🌮</div>
  <div class="bg-food" style="left:90%;animation-duration:17s;animation-delay:4s">🍔</div>

  <h1>🍽️ 점심 메뉴 룰렛</h1>
  <p class="subtitle" id="mainSubtitle">내 위치 기준 맛집 지도!</p>

  <!-- 위치 설정 카드 -->
  <div class="location-card">
    <h2>📍 내 위치 설정</h2>
    <div class="location-status" id="locationStatus">
      <div class="dot"></div>
      <div class="loc-text" id="locationText">위치가 설정되지 않았어요</div>
    </div>
    <div class="location-btns">
      <button class="loc-btn primary" onclick="getGPS()">🛰️ GPS로 자동 설정</button>
      <button class="loc-btn" onclick="toggleManual()">✏️ 직접 입력</button>
      <button class="loc-btn" onclick="resetLocation()" id="resetBtn" style="display:none">🔄 초기화</button>
    </div>
    <div class="location-manual" id="manualForm">
      <input id="locLabel" placeholder="장소 이름 (예: 우리 사무실, 강남역)" maxlength="20">
      <div class="manual-row">
        <input id="locLat" placeholder="위도 (예: 37.4849)" type="number" step="0.0001">
        <input id="locLng" placeholder="경도 (예: 127.0338)" type="number" step="0.0001">
      </div>
      <small style="color:#bbb;font-size:0.75rem">💡 네이버지도에서 원하는 곳 우클릭 → "이곳이 궁금해요" 하면 좌표가 나와요</small>
      <button class="save-loc-btn" onclick="saveManualLocation()">✔ 이 위치로 저장</button>
    </div>
  </div>

  <!-- 룰렛 카드 -->
  <div class="card">
    <div class="roulette-area">
      <div class="result-boxes" id="resultBoxes"></div>
    </div>
    <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 메뉴 뽑기!</button>
  </div>

  <!-- 지도 카드 -->
  <div class="map-card" id="mapCard">
    <div class="map-header">
      <h2 id="mapTitle">📍 주변 식당</h2>
      <p id="mapSubtitle">매봉역 인근 추천 식당</p>
    </div>
    <div id="map"></div>
    <div class="restaurant-list" id="restaurantList"></div>
  </div>

  <!-- 메뉴 + 식당 관리 카드 -->
  <div class="menu-card">
    <h2>📋 메뉴 목록 관리</h2>
    <div class="category-tabs" id="categoryTabs"></div>
    <div class="menu-list" id="menuList"></div>
    <div class="menu-count" id="menuCount"></div>
    <div class="add-menu-row">
      <input class="add-menu-input" id="newMenuInput" placeholder="메뉴 직접 추가..." maxlength="15"
             onkeydown="if(event.key==='Enter')addMenu()">
      <button class="add-btn" onclick="addMenu()">추가</button>
    </div>

    <hr class="section-divider">

    <div class="restaurant-add-title">🏠 식당 직접 추가</div>
    <div class="restaurant-add-grid">
      <input id="rName"    placeholder="식당 이름" maxlength="20">
      <select id="rCat">
        <option value="한식">한식</option>
        <option value="중식">중식</option>
        <option value="일식">일식</option>
        <option value="양식">양식</option>
        <option value="분식">분식</option>
        <option value="기타">기타</option>
      </select>
      <input id="rAddr" class="full" placeholder="주소 (예: 서울 강남구 매봉로 45)" maxlength="50">
      <input id="rLat"  placeholder="위도 (예: 37.4849)" type="number" step="0.0001">
      <input id="rLng"  placeholder="경도 (예: 127.0338)" type="number" step="0.0001">
    </div>
    <button class="add-restaurant-btn" onclick="addRestaurant()">🏠 식당 추가하기</button>
    <div class="restaurant-tag-list" id="customRestaurantTags"></div>
  </div>

  <p class="footer">메뉴 태그 ✖ 클릭 → 오늘 제외 / 지도 마커 클릭 → 상세정보</p>

<script>
  /* ── 매봉역 인근 식당 기본 데이터 ── */
  const BASE_RESTAURANTS = [
    // 한식

    { name:"매봉순대국",   cat:"한식", emoji:"🍲", addr:"서울 강남구 매봉로 53",           lat:37.4841, lng:127.0348 },
    { name:"참나무숯불갈비",cat:"한식",emoji:"🥩", addr:"서울 강남구 삼성로 51길 14",      lat:37.4870, lng:127.0355 },
    { name:"진주회관",     cat:"한식", emoji:"🥗", addr:"서울 강남구 개포로 212",          lat:37.4860, lng:127.0320 },
    { name:"청기와타운",   cat:"한식", emoji:"🥩", addr:"서울 강남구 매봉로 45",           lat:37.4835, lng:127.0342 },
    { name:"한솥도시락",   cat:"한식", emoji:"🍱", addr:"서울 강남구 개포로 210",          lat:37.4848, lng:127.0330 },
    { name:"국밥나라",     cat:"한식", emoji:"🍚", addr:"서울 강남구 도곡로 416",          lat:37.4825, lng:127.0360 },
    // 중식
    { name:"홍보각",       cat:"중식", emoji:"🍜", addr:"서울 강남구 도곡로 429",          lat:37.4832, lng:127.0328 },
    { name:"차이나팰리스", cat:"중식", emoji:"🥟", addr:"서울 강남구 매봉로 58",           lat:37.4857, lng:127.0365 },
    { name:"마라공방",     cat:"중식", emoji:"🌶️", addr:"서울 강남구 개포로 215",          lat:37.4863, lng:127.0308 },
    // 일식
    { name:"스시오마카세", cat:"일식", emoji:"🍣", addr:"서울 강남구 삼성로 49길 8",       lat:37.4875, lng:127.0340 },
    { name:"라멘이치방",   cat:"일식", emoji:"🍜", addr:"서울 강남구 매봉로 47",           lat:37.4843, lng:127.0333 },
    { name:"돈카츠명가",   cat:"일식", emoji:"🍱", addr:"서울 강남구 개포로 205",          lat:37.4856, lng:127.0348 },
    { name:"우동가마",     cat:"일식", emoji:"🍜", addr:"서울 강남구 도곡로 420",          lat:37.4828, lng:127.0318 },
    // 양식
    { name:"파스타공방",   cat:"양식", emoji:"🍝", addr:"서울 강남구 매봉로 62",           lat:37.4862, lng:127.0370 },
    { name:"브런치카페",   cat:"양식", emoji:"🥗", addr:"서울 강남구 도곡로 422",          lat:37.4830, lng:127.0310 },
    { name:"피자알볼로",   cat:"양식", emoji:"🍕", addr:"서울 강남구 개포로 207",          lat:37.4851, lng:127.0302 },
    // 분식
    { name:"엽기떡볶이",   cat:"분식", emoji:"🍢", addr:"서울 강남구 매봉로 51",           lat:37.4839, lng:127.0325 },
    { name:"김밥나라",     cat:"분식", emoji:"🍙", addr:"서울 강남구 개포로 213",          lat:37.4866, lng:127.0315 },
    { name:"순대타운",     cat:"분식", emoji:"🌭", addr:"서울 강남구 도곡로 418",          lat:37.4827, lng:127.0335 },
  ];

  /* ── 카테고리 → 음식 이름 매핑 ── */
  const CAT_KEYWORDS = {
    "한식": ["김치찌개","된장찌개","순두부찌개","비빔밥","불고기","삼겹살","냉면","국밥","곱창","쌈밥","갈비탕","설렁탕","닭갈비","제육볶음","보쌈"],
    "중식": ["짜장면","짬뽕","탕수육","마라탕","양꼬치","볶음밥","훠궈","딤섬"],
    "일식": ["라멘","초밥","우동","돈카츠","규동","오야코동","텐동","소바","야키니쿠"],
    "양식": ["파스타","피자","버거","샌드위치","스테이크","샐러드","리조또","타코"],
    "분식": ["떡볶이","순대","김밥","라면","튀김","쫄면","만두","어묵"],
  };

  const MENUS = {
    "한식": CAT_KEYWORDS["한식"].map(n=>({name:n,emoji:"🍲"})),
    "중식": CAT_KEYWORDS["중식"].map(n=>({name:n,emoji:"🍜"})),
    "일식": CAT_KEYWORDS["일식"].map(n=>({name:n,emoji:"🍣"})),
    "양식": CAT_KEYWORDS["양식"].map(n=>({name:n,emoji:"🍝"})),
    "분식": CAT_KEYWORDS["분식"].map(n=>({name:n,emoji:"🍢"})),
  };

  const EMOJIS = ["🎉","✨","🔥","💥","⭐","🌟","🎊","💫"];

  /* ── 위치 관리 ── */
  let userLocation = JSON.parse(localStorage.getItem('userLocation') || 'null');

  function getBaseLocation() {
    return userLocation ? [userLocation.lat, userLocation.lng] : [37.4849, 127.0338];
  }

  function updateLocationUI() {
    const status = document.getElementById('locationStatus');
    const text   = document.getElementById('locationText');
    const resetBtn = document.getElementById('resetBtn');
    if (userLocation) {
      status.classList.add('set');
      text.textContent = `📍 ${userLocation.label} (${userLocation.lat.toFixed(4)}, ${userLocation.lng.toFixed(4)})`;
      resetBtn.style.display = '';
      document.getElementById('mainSubtitle').textContent = `${userLocation.label} 기준 맛집 지도!`;
    } else {
      status.classList.remove('set');
      text.textContent = '위치가 설정되지 않았어요 (기본: 매봉역)';
      resetBtn.style.display = 'none';
      document.getElementById('mainSubtitle').textContent = '내 위치 기준 맛집 지도!';
    }
  }

  function getGPS() {
    if (!navigator.geolocation) { alert('이 브라우저는 GPS를 지원하지 않아요.'); return; }
    const btn = document.querySelector('.loc-btn.primary');
    btn.textContent = '📡 위치 찾는 중...';
    btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => {
        const label = prompt('이 위치의 이름을 입력해주세요 (예: 우리 사무실)', '우리 사무실') || '내 위치';
        userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude, label };
        localStorage.setItem('userLocation', JSON.stringify(userLocation));
        btn.textContent = '🛰️ GPS로 자동 설정';
        btn.disabled = false;
        updateLocationUI();
        if (leafletMap) { leafletMap.setView([userLocation.lat, userLocation.lng], 15); }
      },
      () => {
        alert('위치를 가져오지 못했어요.\n브라우저 위치 권한을 허용해주세요.');
        btn.textContent = '🛰️ GPS로 자동 설정';
        btn.disabled = false;
      }
    );
  }

  function toggleManual() {
    const form = document.getElementById('manualForm');
    form.classList.toggle('open');
  }

  function saveManualLocation() {
    const label = document.getElementById('locLabel').value.trim() || '내 위치';
    const lat   = parseFloat(document.getElementById('locLat').value);
    const lng   = parseFloat(document.getElementById('locLng').value);
    if (isNaN(lat) || isNaN(lng)) { alert('위도와 경도를 입력해주세요!'); return; }
    userLocation = { lat, lng, label };
    localStorage.setItem('userLocation', JSON.stringify(userLocation));
    document.getElementById('manualForm').classList.remove('open');
    updateLocationUI();
    if (leafletMap) { leafletMap.setView([lat, lng], 15); }
  }

  function resetLocation() {
    if (!confirm('위치 설정을 초기화할까요?')) return;
    userLocation = null;
    localStorage.removeItem('userLocation');
    updateLocationUI();
  }

  let currentCategory = "한식";
  let customMenus   = JSON.parse(localStorage.getItem('lunchCustom') || '[]');
  let excluded      = JSON.parse(localStorage.getItem('lunchExcluded') || '[]');
  let customRests   = JSON.parse(localStorage.getItem('lunchRests') || '[]');
  let spinning = false;
  let leafletMap = null;
  let markers = [];

  /* ── 거리 계산 (km) ── */
  function calcDist(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLng = (lng2-lng1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function distLabel(d) {
    return d < 1 ? Math.round(d*1000)+'m' : d.toFixed(1)+'km';
  }

  /* ── 룰렛 ── */
  function renderResultBoxes() {
    document.getElementById('resultBoxes').innerHTML = `
      <div class="result-box" id="box0">
        <div class="menu-emoji" id="emoji0">🎯</div>
        <div class="person-label">오늘의 메뉴</div>
        <div class="menu-name" id="menu0">?</div>
      </div>`;
  }

  function getAllMenus() {
    let all = [];
    Object.values(MENUS).forEach(list => list.forEach(m => all.push(m.name)));
    customMenus.forEach(m => all.push(m));
    return all.filter(m => !excluded.includes(m));
  }

  function menuToCategory(menuName) {
    for (const [cat, words] of Object.entries(CAT_KEYWORDS)) {
      if (words.includes(menuName)) return cat;
    }
    return null;
  }

  function spin() {
    if (spinning) return;
    const all = getAllMenus();
    if (!all.length) { alert('메뉴가 없어요!'); return; }

    spinning = true;
    const btn = document.getElementById('spinBtn');
    btn.disabled = true;
    btn.textContent = '🎰 뽑는 중...';

    document.getElementById('box0').classList.remove('landed');
    document.getElementById('box0').classList.add('spinning');

    let count = 0;
    const interval = setInterval(() => {
      count++;
      const r = all[Math.floor(Math.random()*all.length)];
      document.getElementById('menu0').textContent = r;
      document.getElementById('emoji0').textContent = EMOJIS[Math.floor(Math.random()*EMOJIS.length)];

      if (count >= 22) {
        clearInterval(interval);
        const pick = all[Math.floor(Math.random()*all.length)];
        document.getElementById('menu0').textContent = pick;
        document.getElementById('emoji0').textContent = '🎉';
        document.getElementById('box0').classList.remove('spinning');
        document.getElementById('box0').classList.add('landed');
        spinning = false;
        btn.disabled = false;
        btn.textContent = '🎰 다시 뽑기!';
        showMap(pick);
      }
    }, 80);
  }

  /* ── 지도 표시 ── */
  function showMap(pickedMenu) {
    const base = getBaseLocation();
    const locLabel = userLocation ? userLocation.label : '매봉역';
    const cat = menuToCategory(pickedMenu);
    const allRests = [...BASE_RESTAURANTS, ...customRests];
    const filtered = cat ? allRests.filter(r => r.cat === cat) : allRests;

    const sorted = filtered
      .map(r => ({...r, dist: calcDist(base[0], base[1], r.lat, r.lng)}))
      .sort((a,b) => a.dist - b.dist);

    const mapCard = document.getElementById('mapCard');
    mapCard.classList.add('visible');
    document.getElementById('mapTitle').textContent = `📍 ${pickedMenu} 주변 식당`;
    document.getElementById('mapSubtitle').textContent = `${locLabel} 기준 ${sorted.length}곳`;

    if (!leafletMap) {
      leafletMap = L.map('map').setView(base, 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
      }).addTo(leafletMap);
    } else {
      leafletMap.setView(base, 15);
    }

    markers.forEach(m => m.remove());
    markers = [];

    const officeIcon = L.divIcon({
      html: '<div style="background:#ff6a00;border:3px solid white;border-radius:50%;width:18px;height:18px;box-shadow:0 2px 8px rgba(0,0,0,0.4)"></div>',
      iconSize: [18, 18], iconAnchor: [9, 9]
    });
    const officeMarker = L.marker(base, {icon: officeIcon})
      .addTo(leafletMap)
      .bindPopup(`<b>📍 ${locLabel} (내 위치)</b>`);
    markers.push(officeMarker);

    // 식당 마커
    sorted.forEach((r, i) => {
      const icon = L.divIcon({
        html: `<div style="background:white;border:2px solid #ff6a00;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.25)">${r.emoji}</div>`,
        iconSize: [32, 32], iconAnchor: [16, 16]
      });
      const m = L.marker([r.lat, r.lng], {icon})
        .addTo(leafletMap)
        .bindPopup(`<b>${r.name}</b><br>${r.cat} · ${distLabel(r.dist)}<br><small>${r.addr}</small>`);
      markers.push(m);
    });

    // 식당 목록
    const list = document.getElementById('restaurantList');
    list.innerHTML = sorted.length
      ? sorted.map((r,i) => `
          <div class="restaurant-item" onclick="focusRestaurant(${i+1})">
            <div class="r-emoji">${r.emoji}</div>
            <div class="r-info">
              <div class="r-name">${r.name}</div>
              <div class="r-cat">${r.cat}</div>
              <div class="r-addr">${r.addr}</div>
            </div>
            <div class="r-dist">${distLabel(r.dist)}</div>
          </div>`).join('')
      : '<div style="padding:20px;text-align:center;color:#ccc">이 카테고리 식당을 추가해보세요!</div>';

    // 리스트 클릭 → 지도 포커스
    window._sortedRests = sorted;
    mapCard.scrollIntoView({behavior:'smooth', block:'start'});
  }

  function focusRestaurant(idx) {
    const r = window._sortedRests[idx-1];
    if (!r) return;
    leafletMap.setView([r.lat, r.lng], 17);
    markers[idx].openPopup();
  }

  /* ── 메뉴 관리 ── */
  function renderCategoryTabs() {
    const cats = [...Object.keys(MENUS), '직접추가'];
    document.getElementById('categoryTabs').innerHTML = cats.map(c =>
      `<button class="cat-tab ${c===currentCategory?'active':''}" onclick="selectCategory('${c}')">${c}</button>`
    ).join('');
  }

  function selectCategory(cat) {
    currentCategory = cat;
    renderCategoryTabs();
    renderMenuList();
  }

  function renderMenuList() {
    const menus = currentCategory === '직접추가'
      ? customMenus.map(n=>({name:n,emoji:'🍴'}))
      : (MENUS[currentCategory] || []);

    document.getElementById('menuList').innerHTML = menus.map(m =>
      `<span class="menu-tag ${excluded.includes(m.name)?'excluded':''}">
        ${m.emoji} ${m.name}
        <span class="tag-toggle" onclick="toggleExclude('${m.name}')">${excluded.includes(m.name)?'✚':'✖'}</span>
      </span>`
    ).join('') || '<span style="color:#ccc;font-size:0.85rem">메뉴를 추가해보세요!</span>';

    document.getElementById('menuCount').textContent = `뽑기 가능 메뉴: ${getAllMenus().length}개`;
  }

  function toggleExclude(name) {
    excluded = excluded.includes(name) ? excluded.filter(e=>e!==name) : [...excluded, name];
    localStorage.setItem('lunchExcluded', JSON.stringify(excluded));
    renderMenuList();
  }

  function addMenu() {
    const val = document.getElementById('newMenuInput').value.trim();
    if (!val) return;
    if (customMenus.includes(val)) { alert('이미 있어요!'); return; }
    customMenus.push(val);
    localStorage.setItem('lunchCustom', JSON.stringify(customMenus));
    document.getElementById('newMenuInput').value = '';
    currentCategory = '직접추가';
    renderCategoryTabs();
    renderMenuList();
  }

  /* ── 식당 직접 추가 ── */
  function addRestaurant() {
    const name = document.getElementById('rName').value.trim();
    const cat  = document.getElementById('rCat').value;
    const addr = document.getElementById('rAddr').value.trim();
    const lat  = parseFloat(document.getElementById('rLat').value);
    const lng  = parseFloat(document.getElementById('rLng').value);

    if (!name || !addr || isNaN(lat) || isNaN(lng)) {
      alert('이름, 주소, 위도, 경도를 모두 입력해주세요!');
      return;
    }

    const EMOJI_MAP = {한식:'🍲',중식:'🍜',일식:'🍣',양식:'🍝',분식:'🍢',기타:'🍴'};
    customRests.push({name, cat, addr, lat, lng, emoji: EMOJI_MAP[cat]||'🍴'});
    localStorage.setItem('lunchRests', JSON.stringify(customRests));

    ['rName','rAddr','rLat','rLng'].forEach(id => document.getElementById(id).value = '');
    renderCustomRestaurantTags();
    alert(`"${name}" 추가됐어요!`);
  }

  function renderCustomRestaurantTags() {
    document.getElementById('customRestaurantTags').innerHTML = customRests.map((r,i) =>
      `<span class="restaurant-tag">
        ${r.emoji} ${r.name}
        <span class="del-btn" onclick="deleteRestaurant(${i})">✖</span>
      </span>`
    ).join('');
  }

  function deleteRestaurant(i) {
    customRests.splice(i, 1);
    localStorage.setItem('lunchRests', JSON.stringify(customRests));
    renderCustomRestaurantTags();
  }

  /* ── 초기화 ── */
  renderResultBoxes();
  renderCategoryTabs();
  renderMenuList();
  renderCustomRestaurantTags();
  updateLocationUI();
</script>
</body>
</html>
