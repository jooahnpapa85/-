<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오늘은 여기다!! 🍽️</title>
  <script src="//dapi.kakao.com/v2/maps/sdk.js?appkey=9284ebd12f81855d710ebbca3be4ec7e&libraries=services"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { max-width: 100%; overflow-x: hidden; }

    body {
      font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background-color: #1a0a00;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(255,90,0,0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(200,40,0,0.15) 0%, transparent 55%),
        radial-gradient(ellipse at 60% 10%, rgba(255,180,0,0.10) 0%, transparent 40%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 14px 60px;
      position: relative;
      overflow-x: hidden;
    }

    /* 배경 이모지 */
    .bg-food {
      position: fixed; font-size: 2rem; opacity: 0.06;
      pointer-events: none; animation: float linear infinite; z-index: 0;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.06; } 90% { opacity: 0.06; }
      100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
    }
    body > *:not(.bg-food) { position: relative; z-index: 1; }

    /* 헤더 */
    .header { text-align: center; margin-bottom: 24px; }
    .header h1 { color: #fff8f0; font-size: 1.9rem; text-shadow: 0 2px 16px rgba(255,100,0,0.5); margin-bottom: 4px; }
    .header p  { color: rgba(255,210,160,0.75); font-size: 0.88rem; }

    /* 공통 카드 */
    .card {
      background: white; border-radius: 22px; width: 100%; max-width: 500px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.3); margin-bottom: 16px;
    }

    /* 위치 설정 카드 */
    .loc-card { padding: 18px; }
    .loc-card-title { font-size: 0.82rem; color: #aaa; font-weight: 600; margin-bottom: 10px; letter-spacing: 0.04em; }
    .loc-status {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 12px; border-radius: 11px; background: #f9f9f9; margin-bottom: 10px;
    }
    .loc-status.set { background: #fff3ec; }
    .loc-dot { width: 8px; height: 8px; border-radius: 50%; background: #ddd; flex-shrink: 0; }
    .loc-status.set .loc-dot { background: #ff6a00; }
    .loc-text { flex: 1; font-size: 0.82rem; color: #888; }
    .loc-status.set .loc-text { color: #c04000; font-weight: 600; }

    .loc-btns { display: flex; gap: 7px; }
    .loc-btn {
      flex: 1; padding: 8px 6px; border: 1.5px solid #e8e8e8;
      border-radius: 10px; background: white; font-size: 0.78rem; font-weight: 700;
      cursor: pointer; font-family: inherit; color: #666; transition: all 0.2s;
    }
    .loc-btn.primary { background: #ff6a00; color: white; border-color: #ff6a00; }
    .loc-btn.primary:hover { background: #d95500; }
    .loc-btn:hover:not(.primary) { border-color: #ff6a00; color: #ff6a00; }

    .loc-manual { display: none; flex-direction: column; gap: 7px; margin-top: 10px; }
    .loc-manual.open { display: flex; }
    .loc-manual input {
      padding: 9px 11px; border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 0.84rem; font-family: inherit; outline: none; width: 100%;
    }
    .loc-manual input:focus { border-color: #ff6a00; }
    .manual-row { display: flex; gap: 7px; }
    .manual-row input { flex: 1; min-width: 0; }
    .loc-hint { font-size: 0.7rem; color: #ccc; line-height: 1.5; }
    .save-loc-btn {
      padding: 9px; background: #ff6a00; color: white; border: none;
      border-radius: 10px; font-size: 0.84rem; font-weight: 700; cursor: pointer; font-family: inherit;
    }

    /* 메인 룰렛 카드 */
    .main-card { padding: 24px 18px; }

    /* 카테고리 탭 */
    .cat-label { font-size: 0.78rem; color: #bbb; font-weight: 600; margin-bottom: 10px; letter-spacing: 0.04em; }
    .cat-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 22px; }
    .cat-tab {
      padding: 7px 14px; border-radius: 20px; border: 2px solid #eee;
      font-size: 0.84rem; cursor: pointer; font-family: inherit;
      font-weight: 700; transition: all 0.18s; background: white; color: #999;
    }
    .cat-tab:hover { border-color: #ffb380; color: #ff6a00; }
    .cat-tab.active { background: #ff6a00; color: white; border-color: #ff6a00; box-shadow: 0 3px 12px rgba(255,106,0,0.35); }

    /* 결과 표시 영역 */
    .result-area {
      background: linear-gradient(135deg, #1a0a00 0%, #3d1500 100%);
      border-radius: 18px; padding: 28px 20px; text-align: center;
      margin-bottom: 20px; min-height: 160px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    .result-area::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at center, rgba(255,106,0,0.12) 0%, transparent 70%);
    }

    .result-emoji { font-size: 3rem; margin-bottom: 8px; transition: all 0.1s; }

    .result-label { font-size: 0.72rem; color: rgba(255,180,100,0.6); font-weight: 600; letter-spacing: 0.08em; margin-bottom: 6px; }

    .result-name {
      font-size: 1.6rem; font-weight: 800; color: white;
      text-shadow: 0 2px 12px rgba(255,106,0,0.5);
      min-height: 44px; display: flex; align-items: center; justify-content: center;
      line-height: 1.2; word-break: keep-all; text-align: center;
    }
    .result-name.spinning { animation: flicker 0.08s infinite; }
    @keyframes flicker { 0%{opacity:1} 50%{opacity:0.4} 100%{opacity:1} }

    .result-category {
      font-size: 0.78rem; color: rgba(255,180,100,0.7); margin-top: 6px;
      font-weight: 600;
    }
    .result-addr {
      font-size: 0.75rem; color: rgba(255,255,255,0.4); margin-top: 4px;
    }

    .result-area.landed {
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      0%  { transform: scale(1); }
      35% { transform: scale(1.04); }
      65% { transform: scale(0.97); }
      100%{ transform: scale(1); }
    }

    /* 메인 버튼 */
    .spin-btn {
      width: 100%;
      padding: 20px;
      background: linear-gradient(135deg, #ff6a00 0%, #ee0979 100%);
      color: white; border: none; border-radius: 16px;
      font-size: 1.3rem; font-weight: 900; cursor: pointer; font-family: inherit;
      box-shadow: 0 8px 28px rgba(255,80,0,0.5);
      transition: all 0.2s; letter-spacing: -0.02em;
    }
    .spin-btn:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(255,80,0,0.6); }
    .spin-btn:active { transform: translateY(0); }
    .spin-btn:disabled { opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: none; }

    /* 지도 카드 */
    .map-card { display: none; overflow: hidden; }
    .map-card.visible { display: block; }

    .map-header { padding: 14px 18px 10px; border-bottom: 1px solid #f5f5f5; }
    .map-header h2 { font-size: 0.95rem; color: #222; font-weight: 800; margin-bottom: 2px; }
    .map-header p  { font-size: 0.75rem; color: #bbb; }

    .map-badge {
      display: inline-block; background: #fff3ec; color: #ff6a00;
      font-size: 0.72rem; font-weight: 700; padding: 3px 9px;
      border-radius: 10px; margin-top: 5px;
    }

    #kakaoMap { width: 100%; height: 280px; }

    /* 식당 상세 */
    .restaurant-detail {
      padding: 16px 18px;
      border-top: 1px solid #f5f5f5;
    }
    .detail-name { font-size: 1.1rem; font-weight: 800; color: #222; margin-bottom: 4px; }
    .detail-cat  { font-size: 0.78rem; color: #ff6a00; font-weight: 600; margin-bottom: 6px; }
    .detail-addr { font-size: 0.8rem; color: #888; margin-bottom: 12px; line-height: 1.5; }
    .detail-actions { display: flex; gap: 8px; }
    .detail-btn {
      flex: 1; padding: 10px; border-radius: 11px; font-size: 0.84rem;
      font-weight: 700; cursor: pointer; font-family: inherit; border: none;
      transition: all 0.18s; text-align: center; text-decoration: none; display: block;
    }
    .detail-btn.kakao { background: #FEE500; color: #3C1E1E; }
    .detail-btn.kakao:hover { background: #ffd900; }
    .detail-btn.retry { background: #f5f5f5; color: #555; }
    .detail-btn.retry:hover { background: #ebebeb; }

    /* 로딩 */
    .map-loading { padding: 28px; text-align: center; color: #ccc; font-size: 0.85rem; }
    .spinner {
      display: inline-block; width: 22px; height: 22px;
      border: 3px solid #f0f0f0; border-top-color: #ff6a00;
      border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer { color: rgba(255,180,100,0.35); font-size: 0.72rem; margin-top: 14px; text-align: center; }
  </style>
</head>
<body>

  <div class="bg-food" style="left:5%;animation-duration:14s;animation-delay:0s">🍜</div>
  <div class="bg-food" style="left:22%;animation-duration:18s;animation-delay:3s">🍣</div>
  <div class="bg-food" style="left:44%;animation-duration:12s;animation-delay:1s;font-size:1.6rem">🍕</div>
  <div class="bg-food" style="left:65%;animation-duration:16s;animation-delay:5s;font-size:2.5rem">🥩</div>
  <div class="bg-food" style="left:84%;animation-duration:20s;animation-delay:2s">🍱</div>

  <div class="header">
    <h1>🍽️ 오늘은 여기다!!</h1>
    <p id="headerSub">내 위치 기준 1km 이내 맛집 랜덤 추천</p>
  </div>

  <!-- 위치 카드 -->
  <div class="card loc-card">
    <div class="loc-card-title">📍 내 위치</div>
    <div class="loc-status" id="locStatus">
      <div class="loc-dot"></div>
      <div class="loc-text" id="locText">위치 미설정 — 설정하면 더 정확해요</div>
    </div>
    <div class="loc-btns">
      <button class="loc-btn primary" onclick="getGPS()">🛰️ GPS 자동설정</button>
      <button class="loc-btn" onclick="toggleManual()">✏️ 직접 입력</button>
      <button class="loc-btn" onclick="resetLoc()" id="resetBtn" style="display:none">🔄 초기화</button>
    </div>
    <div class="loc-manual" id="manualForm">
      <input id="locLabel" placeholder="장소 이름 (예: 우리 사무실)" maxlength="20">
      <div class="manual-row">
        <input id="locLat" placeholder="위도 (예: 37.4849)" type="number" step="0.0001">
        <input id="locLng" placeholder="경도 (예: 127.0338)" type="number" step="0.0001">
      </div>
      <p class="loc-hint">💡 카카오맵에서 원하는 위치 길게 누르면 좌표가 나와요</p>
      <button class="save-loc-btn" onclick="saveManual()">✔ 저장</button>
    </div>
  </div>

  <!-- 메인 카드 -->
  <div class="card main-card">
    <div class="cat-label">카테고리 선택</div>
    <div class="cat-tabs">
      <button class="cat-tab active" onclick="selectCat(this,'전체')">🍽️ 전체</button>
      <button class="cat-tab" onclick="selectCat(this,'한식')">🍲 한식</button>
      <button class="cat-tab" onclick="selectCat(this,'중식')">🥡 중식</button>
      <button class="cat-tab" onclick="selectCat(this,'양식')">🍝 양식</button>
      <button class="cat-tab" onclick="selectCat(this,'아시안')">🍜 아시안</button>
    </div>

    <div class="result-area" id="resultArea">
      <div class="result-emoji" id="resultEmoji">🎯</div>
      <div class="result-label">오늘의 맛집</div>
      <div class="result-name" id="resultName">버튼을 눌러보세요!</div>
      <div class="result-category" id="resultCat"></div>
      <div class="result-addr" id="resultAddr"></div>
    </div>

    <button class="spin-btn" id="spinBtn" onclick="pickRestaurant()">
      🎰 오늘은 여기다!!
    </button>
  </div>

  <!-- 지도 카드 -->
  <div class="card map-card" id="mapCard">
    <div class="map-header">
      <h2 id="mapRestName">맛집 이름</h2>
      <p id="mapRestCat"></p>
      <span class="map-badge" id="mapDist"></span>
    </div>
    <div id="kakaoMap"></div>
    <div id="mapContent">
      <div class="map-loading"><div class="spinner"></div><br>지도 불러오는 중...</div>
    </div>
  </div>

  <p class="footer">카카오맵 실시간 데이터 · 반경 1km 이내 · 매번 다른 곳 추천</p>

<script>
  /* ── 카테고리 설정 ── */
  // 각 카테고리별 검색 키워드 목록 (여러 개를 병렬 검색해서 결과 합산)
  const CAT_KEYWORDS = {
    '전체': ['한식', '중식', '일식', '양식', '분식'],
    '한식': ['한식', '순대국밥', '삼겹살', '갈비', '설렁탕', '국밥', '찌개', '삼계탕'],
    '중식': ['중식', '중국집', '짜장면', '짬뽕', '탕수육', '마라탕', '양꼬치'],
    '양식': ['햄버거', '피자', '파스타', '스테이크', '양식', '브런치', '샌드위치'],
    '아시안': ['쌀국수', '태국음식', '베트남음식', '팟타이', '쌀국수전문', '동남아음식', '일식'],
  };
  const CAT_EMOJIS = { '전체':'🍽️', '한식':'🍲', '중식':'🥡', '양식':'🍝', '아시안':'🍜' };
  const SPIN_EMOJIS = ['🍜','🍣','🍕','🥩','🍱','🌮','🥘','🍛','🍔','🥗'];

  let selectedCat = '전체';
  let kakaoMap = null;
  let currentMarker = null;
  let spinning = false;

  /* ── 위치 ── */
  const DEFAULT = { lat: 37.4849, lng: 127.0338, label: '매봉역' };
  let userLoc = JSON.parse(localStorage.getItem('userLoc') || 'null');

  function getBase() { return userLoc || DEFAULT; }

  function updateLocUI() {
    const st = document.getElementById('locStatus');
    const tx = document.getElementById('locText');
    const rb = document.getElementById('resetBtn');
    if (userLoc) {
      st.classList.add('set');
      tx.textContent = `${userLoc.label} (${userLoc.lat.toFixed(4)}, ${userLoc.lng.toFixed(4)})`;
      rb.style.display = '';
      document.getElementById('headerSub').textContent = `${userLoc.label} 기준 1km 이내 맛집 랜덤 추천`;
    } else {
      st.classList.remove('set');
      tx.textContent = '위치 미설정 — 설정하면 더 정확해요';
      rb.style.display = 'none';
    }
  }

  function saveLoc(loc) {
    userLoc = loc;
    localStorage.setItem('userLoc', JSON.stringify(loc));
    if (kakaoMap) { kakaoMap = null; }
    document.getElementById('mapCard').classList.remove('visible');
    updateLocUI();
  }

  function getGPS() {
    if (!navigator.geolocation) { alert('GPS를 지원하지 않아요.'); return; }
    const btn = document.querySelector('.loc-btn.primary');
    btn.textContent = '📡 찾는 중...'; btn.disabled = true;
    navigator.geolocation.getCurrentPosition(
      pos => {
        const label = prompt('이 위치 이름을 입력해주세요', '우리 사무실') || '내 위치';
        saveLoc({ lat: pos.coords.latitude, lng: pos.coords.longitude, label });
        btn.textContent = '🛰️ GPS 자동설정'; btn.disabled = false;
        alert(`✅ "${label}"로 저장됐어요!`);
      },
      () => { alert('위치 권한을 허용해주세요.'); btn.textContent = '🛰️ GPS 자동설정'; btn.disabled = false; }
    );
  }

  function toggleManual() { document.getElementById('manualForm').classList.toggle('open'); }

  function saveManual() {
    const label = document.getElementById('locLabel').value.trim() || '내 위치';
    const lat = parseFloat(document.getElementById('locLat').value);
    const lng = parseFloat(document.getElementById('locLng').value);
    if (isNaN(lat) || isNaN(lng)) { alert('위도와 경도를 입력해주세요!'); return; }
    saveLoc({ lat, lng, label });
    document.getElementById('manualForm').classList.remove('open');
    alert(`✅ "${label}"로 저장됐어요!`);
  }

  function resetLoc() {
    if (!confirm('위치를 초기화할까요?')) return;
    userLoc = null; localStorage.removeItem('userLoc');
    if (kakaoMap) kakaoMap = null;
    document.getElementById('mapCard').classList.remove('visible');
    updateLocUI();
  }

  /* ── 카테고리 ── */
  function selectCat(el, cat) {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    selectedCat = cat;
  }

  /* ── 핵심: 식당 랜덤 뽑기 ── */
  function pickRestaurant() {
    if (spinning) return;
    spinning = true;

    const btn = document.getElementById('spinBtn');
    btn.disabled = true;

    // 룰렛 애니메이션 시작
    document.getElementById('resultArea').classList.remove('landed');
    document.getElementById('resultName').classList.add('spinning');
    document.getElementById('resultCat').textContent = '';
    document.getElementById('resultAddr').textContent = '';

    let tick = 0;
    const anim = setInterval(() => {
      tick++;
      document.getElementById('resultEmoji').textContent = SPIN_EMOJIS[tick % SPIN_EMOJIS.length];
      document.getElementById('resultName').textContent = ['두근두근...','어디일까?','설레는 중!','잠깐만요~','거의 다 됐어요!'][tick % 5];
      btn.textContent = ['🎰 오늘은...','🎰 여기...','🎰 다!!','🎰 오늘은...'][tick % 4];
    }, 150);

    // 카카오 검색 — 카테고리별 키워드 여러 개를 병렬 검색 후 합산
    const base = getBase();
    const keywords = CAT_KEYWORDS[selectedCat];
    const ps = new kakao.maps.services.Places();
    const opts = {
      location: new kakao.maps.LatLng(base.lat, base.lng),
      radius: 1000,
      sort: kakao.maps.services.SortBy.DISTANCE
    };

    // 키워드 하나씩 검색하는 Promise 래퍼
    function searchOne(kw) {
      return new Promise(resolve => {
        ps.keywordSearch(kw, (data, status) => {
          resolve(status === kakao.maps.services.Status.OK ? data : []);
        }, opts);
      });
    }

    // 모든 키워드 검색 완료 후 처리
    Promise.all(keywords.map(kw => searchOne(kw))).then(results => {
      clearInterval(anim);
      document.getElementById('resultName').classList.remove('spinning');

      // 중복 제거 (id 기준) 후 1km 이내 필터
      const seen = new Set();
      const nearby = results.flat().filter(p => {
        if (seen.has(p.id)) return false;
        seen.add(p.id);
        const d = calcDist(base.lat, base.lng, parseFloat(p.y), parseFloat(p.x));
        return d * 1000 <= 1000;
      });

      if (!nearby.length) {
        showError('1km 이내에 해당 음식점이 없어요 😢\n카테고리를 바꾸거나 위치를 확인해주세요.');
        return;
      }

      // 랜덤 1곳 선택
      const picked = nearby[Math.floor(Math.random() * nearby.length)];
      const dist = calcDist(base.lat, base.lng, parseFloat(picked.y), parseFloat(picked.x));

      showResult(picked, dist);
    });
  }

  function showError(msg) {
    document.getElementById('resultEmoji').textContent = '😢';
    document.getElementById('resultName').textContent = '다시 시도해주세요';
    document.getElementById('resultCat').textContent = msg;
    document.getElementById('spinBtn').textContent = '🎰 오늘은 여기다!!';
    document.getElementById('spinBtn').disabled = false;
    spinning = false;
  }

  function showResult(p, dist) {
    const cat = p.category_name.split('>').pop().trim();
    const emoji = CAT_EMOJIS[selectedCat] || '🍽️';

    // 결과 표시
    document.getElementById('resultEmoji').textContent = '🎉';
    document.getElementById('resultName').textContent = p.place_name;
    document.getElementById('resultCat').textContent = cat;
    document.getElementById('resultAddr').textContent = p.road_address_name || p.address_name;

    const area = document.getElementById('resultArea');
    area.classList.add('landed');

    const btn = document.getElementById('spinBtn');
    btn.textContent = '🎰 다른 곳도 볼게요!';
    btn.disabled = false;
    spinning = false;

    // 지도 표시
    showMap(p, dist, cat);
  }

  function showMap(p, dist, cat) {
    const mapCard = document.getElementById('mapCard');
    document.getElementById('mapRestName').textContent = p.place_name;
    document.getElementById('mapRestCat').textContent = cat;
    document.getElementById('mapDist').textContent = `📍 ${distLabel(dist)} 거리`;
    mapCard.classList.add('visible');

    setTimeout(() => {
      const lat = parseFloat(p.y), lng = parseFloat(p.x);
      const pos = new kakao.maps.LatLng(lat, lng);
      const container = document.getElementById('kakaoMap');

      if (!kakaoMap) {
        kakaoMap = new kakao.maps.Map(container, { center: pos, level: 4 });
      } else {
        kakaoMap.setCenter(pos);
        kakaoMap.setLevel(4);
      }
      kakaoMap.relayout();

      if (currentMarker) currentMarker.setMap(null);
      currentMarker = new kakao.maps.Marker({ position: pos, map: kakaoMap });

      const info = new kakao.maps.InfoWindow({
        content: `<div style="padding:8px 10px;font-size:13px;font-weight:800;white-space:nowrap">🎉 ${p.place_name}</div>`,
        removable: false
      });
      info.open(kakaoMap, currentMarker);

      document.getElementById('mapContent').innerHTML = `
        <div class="restaurant-detail">
          <div class="detail-name">${p.place_name}</div>
          <div class="detail-cat">${cat} · ${distLabel(dist)}</div>
          <div class="detail-addr">${p.road_address_name || p.address_name}</div>
          <div class="detail-actions">
            <a class="detail-btn kakao" href="${p.place_url}" target="_blank">🗺️ 카카오맵에서 보기</a>
            <button class="detail-btn retry" onclick="pickRestaurant()">🔀 다른 곳!</button>
          </div>
        </div>`;

      mapCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }

  /* ── 유틸 ── */
  function calcDist(lat1, lng1, lat2, lng2) {
    const R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }
  function distLabel(d) { return d < 1 ? Math.round(d*1000)+'m' : d.toFixed(1)+'km'; }

  updateLocUI();
</script>
</body>
</html>
